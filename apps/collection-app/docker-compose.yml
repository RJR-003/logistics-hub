version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: collection_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: collection_db
    ports:
      - "5432:5432"
    volumes:
      - collection_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - logistics_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: collection_backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/collection_db
      FRONTEND_URL: http://localhost:3000
      APP2_URL: http://logistics_backend:3002
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - logistics_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001
    container_name: collection_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      API_URL: http://collection_backend:3001
    depends_on:
      - backend
    networks:
      - logistics_network
volumes:
  collection_db_data:

networks:
  logistics_network:
    name: logistics_network
    driver: bridge
