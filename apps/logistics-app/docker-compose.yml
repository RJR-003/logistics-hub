services:
  postgres:
    image: postgres:15
    container_name: logistics_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: logistics_db
    ports:
      - "5433:5432"
    volumes:
      - logistics_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - logistics_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: logistics_backend
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/logistics_db
      APP1_URL: http://collection_backend:3001
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - logistics_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3002
    container_name: logistics_frontend
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      API_URL: http://logistics_backend:3002
    depends_on:
      - backend
    networks:
      - logistics_network
volumes:
  logistics_db_data:

networks:
  logistics_network:
    name: logistics_network
    driver: bridge
