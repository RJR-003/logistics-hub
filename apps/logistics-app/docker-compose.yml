services:
  postgres:
    image: postgres:15
    container_name: logistics_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: logistics_db
    ports:
      - "5433:5432"
    volumes:
      - logistics_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: logistics_backend
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/logistics_db
      APP1_URL: http://host.docker.internal:3001
    depends_on:
      postgres:
        condition: service_healthy
volumes:
  logistics_db_data:
